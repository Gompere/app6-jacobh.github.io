<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application 6 - Real-time Flight Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    header {
      background: #333;
      color: #fff;
      padding: 20px 0;
    }
    .container {
      padding: 20px;
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      height: 0;
      overflow: hidden;
      max-width: 3200px;
      margin: 0 auto;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Application 6 - Real-time Flight Simulator in Wokwi</h1>
  <p>By: Jacob Henderson</p>
</header>

<div class="container">
  <h2>Application 6 Youtube Demo</h2>
  <div class="video-container">
    <!-- Replace VIDEO_ID with your YouTube video's ID -->
    <iframe src="https://www.youtube.com/embed/Z2vpLQBYZoU" allowfullscreen></iframe>
  </div>
</div>

</body>
</html>
